<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Dice-tray button — icon options (batch 3, d4-heavy)</title>
		<style>
			@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap');
			:root {
				--accent-deep: #b3243a;
				--bg: #0f1116;
				--text: #e6e8ec;
				--muted: #878f9d;
			}
			body {
				background: var(--bg);
				color: var(--text);
				font-family: 'Space Grotesk', sans-serif;
				margin: 0;
				padding: 32px;
			}
			h1 {
				font-size: 18px;
				font-weight: 700;
				margin: 0 0 4px;
			}
			p.sub {
				color: var(--muted);
				font-size: 13px;
				margin: 0 0 24px;
			}
			.grid {
				display: grid;
				grid-template-columns: repeat(2, 1fr);
				gap: 16px 40px;
				max-width: 760px;
			}
			.cell {
				display: flex;
				align-items: center;
				gap: 14px;
			}
			.num {
				font-family: monospace;
				font-size: 12px;
				color: var(--muted);
				width: 20px;
				text-align: right;
			}
			.dice {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				font-family: 'Space Grotesk', sans-serif;
				font-weight: 600;
				font-size: 13px;
				padding: 7px 14px;
				border-radius: 999px;
				background: var(--accent-deep);
				border: 1px solid var(--accent-deep);
				color: #fff;
				cursor: pointer;
			}
			.name {
				font-size: 12px;
				color: var(--muted);
			}
			svg {
				flex: none;
			}
		</style>
	</head>
	<body>
		<h1>Dice-tray button — 10 more options (21–30, d4-heavy)</h1>
		<p class="sub">Several d4 (tetrahedron) styles + a few others. Pick a number.</p>
		<div class="grid">
			<!-- 21: d4 outline -->
			<div class="cell">
				<span class="num">21</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.6"
						stroke-linejoin="round"
					>
						<path d="M12 3 L20.5 20 L3.5 20 Z" />
					</svg>
					Dice tray
				</button>
				<span class="name">d4 outline</span>
			</div>

			<!-- 22: d4 top-down (spokes to centroid) -->
			<div class="cell">
				<span class="num">22</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linejoin="round"
					>
						<path d="M12 3 L20.5 20 L3.5 20 Z" />
						<path d="M12 3 L12 14.3 M20.5 20 L12 14.3 M3.5 20 L12 14.3" />
					</svg>
					Dice tray
				</button>
				<span class="name">d4 top-down (faces)</span>
			</div>

			<!-- 23: d4 + "4" -->
			<div class="cell">
				<span class="num">23</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.6"
						stroke-linejoin="round"
					>
						<path d="M12 3 L20.5 20 L3.5 20 Z" />
						<text
							x="12"
							y="18"
							font-size="8"
							font-weight="700"
							text-anchor="middle"
							fill="#fff"
							stroke="none"
							font-family="sans-serif"
						>
							4
						</text>
					</svg>
					Dice tray
				</button>
				<span class="name">d4 + “4”</span>
			</div>

			<!-- 24: d4 inverted + "4" -->
			<div class="cell">
				<span class="num">24</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.6"
						stroke-linejoin="round"
					>
						<path d="M3.5 4 L20.5 4 L12 21 Z" />
						<text
							x="12"
							y="12"
							font-size="8"
							font-weight="700"
							text-anchor="middle"
							fill="#fff"
							stroke="none"
							font-family="sans-serif"
						>
							4
						</text>
					</svg>
					Dice tray
				</button>
				<span class="name">d4 inverted + “4”</span>
			</div>

			<!-- 25: d4 solid -->
			<div class="cell">
				<span class="num">25</span>
				<button class="dice">
					<svg width="15" height="15" viewBox="0 0 24 24">
						<path d="M12 3 L20.5 20 L3.5 20 Z" fill="#fff" />
						<path
							d="M12 3 L12 14.3 M20.5 20 L12 14.3 M3.5 20 L12 14.3"
							fill="none"
							stroke="#b3243a"
							stroke-width="1.1"
							stroke-linejoin="round"
						/>
					</svg>
					Dice tray
				</button>
				<span class="name">d4 solid</span>
			</div>

			<!-- 26: d4 3D tetrahedron -->
			<div class="cell">
				<span class="num">26</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linejoin="round"
					>
						<path d="M12 2.5 L21 19 L3 19 Z" />
						<path d="M12 2.5 L9.5 19 M9.5 19 L3 19 M9.5 19 L21 19" />
						<path d="M12 2.5 L9.5 12" />
					</svg>
					Dice tray
				</button>
				<span class="name">d4 3D tetra</span>
			</div>

			<!-- 27: d4 rounded corners -->
			<div class="cell">
				<span class="num">27</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.6"
						stroke-linejoin="round"
					>
						<path
							d="M10.6 4.2 Q12 3.2 13.4 4.2 L20.2 18.4 Q20.9 20 19.1 20 L4.9 20 Q3.1 20 3.8 18.4 Z"
						/>
					</svg>
					Dice tray
				</button>
				<span class="name">d4 rounded</span>
			</div>

			<!-- 28: d4 + apex pip -->
			<div class="cell">
				<span class="num">28</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.6"
						stroke-linejoin="round"
					>
						<path d="M12 3 L20.5 20 L3.5 20 Z" />
						<circle cx="12" cy="8" r="1.3" fill="#fff" stroke="none" />
					</svg>
					Dice tray
				</button>
				<span class="name">d4 + apex pip</span>
			</div>

			<!-- 29: d20 + d4 pair -->
			<div class="cell">
				<span class="num">29</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.4"
						stroke-linejoin="round"
					>
						<path d="M9 2.5 L15.5 6 L15.5 13 L9 16.5 L2.5 13 L2.5 6 Z" />
						<path d="M9 6 L12.2 11 L5.8 11 Z" />
						<path d="M17.5 11 L23 21 L12 21 Z" fill="#b3243a" />
					</svg>
					Dice tray
				</button>
				<span class="name">d20 + d4</span>
			</div>

			<!-- 30: d4 rolling (motion) -->
			<div class="cell">
				<span class="num">30</span>
				<button class="dice">
					<svg
						width="16"
						height="15"
						viewBox="0 0 26 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.6"
						stroke-linecap="round"
						stroke-linejoin="round"
					>
						<path d="M15 3.5 L23 20.5 L7 20.5 Z" />
						<path d="M1 9 L4.5 9 M0.5 13 L4 13 M1 17 L4.5 17" opacity="0.85" />
					</svg>
					Dice tray
				</button>
				<span class="name">d4 rolling (motion)</span>
			</div>
		</div>
	</body>
</html>
