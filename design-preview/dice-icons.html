<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Dice-tray button — icon options</title>
		<style>
			@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap');
			:root {
				--accent-deep: #b3243a;
				--bg: #0f1116;
				--text: #e6e8ec;
				--muted: #878f9d;
			}
			body {
				background: var(--bg);
				color: var(--text);
				font-family: 'Space Grotesk', sans-serif;
				margin: 0;
				padding: 32px;
			}
			h1 {
				font-size: 18px;
				font-weight: 700;
				margin: 0 0 4px;
			}
			p.sub {
				color: var(--muted);
				font-size: 13px;
				margin: 0 0 24px;
			}
			.grid {
				display: grid;
				grid-template-columns: repeat(2, 1fr);
				gap: 16px 40px;
				max-width: 760px;
			}
			.cell {
				display: flex;
				align-items: center;
				gap: 14px;
			}
			.num {
				font-family: monospace;
				font-size: 12px;
				color: var(--muted);
				width: 20px;
				text-align: right;
			}
			.dice {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				font-family: 'Space Grotesk', sans-serif;
				font-weight: 600;
				font-size: 13px;
				padding: 7px 14px;
				border-radius: 999px;
				background: var(--accent-deep);
				border: 1px solid var(--accent-deep);
				color: #fff;
				cursor: pointer;
			}
			.name {
				font-size: 12px;
				color: var(--muted);
			}
			svg {
				flex: none;
			}
		</style>
	</head>
	<body>
		<h1>Dice-tray button — 10 icon options</h1>
		<p class="sub">Same crimson button, white 15px icon. Pick a number.</p>
		<div class="grid">
			<!-- 1: d20 line (CURRENT) -->
			<div class="cell">
				<span class="num">1</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linecap="round"
						stroke-linejoin="round"
					>
						<path d="M12 2.2 L20.5 7.1 L20.5 16.9 L12 21.8 L3.5 16.9 L3.5 7.1 Z" />
						<path d="M12 7.4 L16.5 15.4 L7.5 15.4 Z" />
						<path
							d="M12 2.2 L12 7.4 M20.5 7.1 L16.5 15.4 M3.5 7.1 L7.5 15.4 M20.5 16.9 L16.5 15.4 M3.5 16.9 L7.5 15.4 M12 21.8 L12 15.4"
						/>
					</svg>
					Dice tray
				</button>
				<span class="name">d20 line (current)</span>
			</div>

			<!-- 2: d20 solid -->
			<div class="cell">
				<span class="num">2</span>
				<button class="dice">
					<svg width="15" height="15" viewBox="0 0 24 24">
						<path d="M12 2.2 L20.5 7.1 L20.5 16.9 L12 21.8 L3.5 16.9 L3.5 7.1 Z" fill="#fff" />
						<path
							d="M12 7.4 L16.5 15.4 L7.5 15.4 Z M12 2.2 L12 7.4 M20.5 7.1 L16.5 15.4 M3.5 7.1 L7.5 15.4 M12 21.8 L12 15.4"
							fill="none"
							stroke="#b3243a"
							stroke-width="1.1"
							stroke-linejoin="round"
						/>
					</svg>
					Dice tray
				</button>
				<span class="name">d20 solid</span>
			</div>

			<!-- 3: d20 with "20" -->
			<div class="cell">
				<span class="num">3</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linejoin="round"
					>
						<path d="M12 2.2 L20.5 7.1 L20.5 16.9 L12 21.8 L3.5 16.9 L3.5 7.1 Z" />
						<text
							x="12"
							y="15.5"
							font-size="9"
							font-weight="700"
							text-anchor="middle"
							fill="#fff"
							stroke="none"
							font-family="sans-serif"
						>
							20
						</text>
					</svg>
					Dice tray
				</button>
				<span class="name">d20 + “20”</span>
			</div>

			<!-- 4: d20 minimal (no spokes) -->
			<div class="cell">
				<span class="num">4</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linejoin="round"
					>
						<path d="M12 2.2 L20.5 7.1 L20.5 16.9 L12 21.8 L3.5 16.9 L3.5 7.1 Z" />
						<path d="M12 7.4 L16.5 15.4 L7.5 15.4 Z" />
					</svg>
					Dice tray
				</button>
				<span class="name">d20 minimal</span>
			</div>

			<!-- 5: d20 faceted (3 top spokes) -->
			<div class="cell">
				<span class="num">5</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linejoin="round"
					>
						<path d="M12 2.2 L20.5 7.1 L20.5 16.9 L12 21.8 L3.5 16.9 L3.5 7.1 Z" />
						<path d="M12 7.4 L16.5 15.4 L7.5 15.4 Z" />
						<path d="M12 2.2 L12 7.4 M20.5 7.1 L16.5 15.4 M3.5 7.1 L7.5 15.4" />
					</svg>
					Dice tray
				</button>
				<span class="name">d20 faceted top</span>
			</div>

			<!-- 6: d20 + sparkle -->
			<div class="cell">
				<span class="num">6</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linejoin="round"
					>
						<path d="M11 4.5 L18.5 8.7 L18.5 16.9 L11 21.1 L3.5 16.9 L3.5 8.7 Z" />
						<path d="M11 8.9 L15 15.4 L7 15.4 Z" />
						<path
							d="M20.5 2 l0.7 1.9 l1.9 0.7 l-1.9 0.7 l-0.7 1.9 l-0.7 -1.9 l-1.9 -0.7 l1.9 -0.7 Z"
							fill="#fff"
							stroke="none"
						/>
					</svg>
					Dice tray
				</button>
				<span class="name">d20 + sparkle</span>
			</div>

			<!-- 7: d6 single with pips -->
			<div class="cell">
				<span class="num">7</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.6"
						stroke-linejoin="round"
					>
						<rect x="4" y="4" width="16" height="16" rx="4" />
						<circle cx="8.5" cy="8.5" r="1.4" fill="#fff" stroke="none" />
						<circle cx="12" cy="12" r="1.4" fill="#fff" stroke="none" />
						<circle cx="15.5" cy="15.5" r="1.4" fill="#fff" stroke="none" />
					</svg>
					Dice tray
				</button>
				<span class="name">d6 with pips</span>
			</div>

			<!-- 8: d6 pair -->
			<div class="cell">
				<span class="num">8</span>
				<button class="dice">
					<svg
						width="16"
						height="15"
						viewBox="0 0 26 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.6"
						stroke-linejoin="round"
					>
						<rect x="2.5" y="8" width="12" height="12" rx="3" />
						<circle cx="6" cy="11.5" r="1.1" fill="#fff" stroke="none" />
						<circle cx="11" cy="16.5" r="1.1" fill="#fff" stroke="none" />
						<rect x="12.5" y="3.5" width="11.5" height="11.5" rx="3" fill="#b3243a" />
						<circle cx="18.2" cy="9.2" r="1.1" fill="#fff" stroke="none" />
						<circle cx="15.4" cy="6.4" r="1.1" fill="#fff" stroke="none" />
						<circle cx="21" cy="12" r="1.1" fill="#fff" stroke="none" />
					</svg>
					Dice tray
				</button>
				<span class="name">d6 pair</span>
			</div>

			<!-- 9: d6 isometric cube -->
			<div class="cell">
				<span class="num">9</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linejoin="round"
					>
						<path d="M12 2.5 L20.5 7.2 L20.5 16.8 L12 21.5 L3.5 16.8 L3.5 7.2 Z" />
						<path d="M3.5 7.2 L12 12 L20.5 7.2 M12 12 L12 21.5" />
						<circle cx="8" cy="15" r="1.1" fill="#fff" stroke="none" />
						<circle cx="16" cy="15" r="1.1" fill="#fff" stroke="none" />
					</svg>
					Dice tray
				</button>
				<span class="name">d6 isometric cube</span>
			</div>

			<!-- 10: dice cup / shaker -->
			<div class="cell">
				<span class="num">10</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linecap="round"
						stroke-linejoin="round"
					>
						<path d="M6 9 L18 9 L16.2 18 Q12 20.5 7.8 18 Z" />
						<path d="M5 9 L19 9" />
						<path d="M15 3.2 L16 5 L18 5.4 L16.6 6.9 L16.9 9" />
						<circle cx="16" cy="4.6" r="0.4" fill="#fff" stroke="none" />
					</svg>
					Dice tray
				</button>
				<span class="name">dice cup / roll</span>
			</div>
		</div>
	</body>
</html>
