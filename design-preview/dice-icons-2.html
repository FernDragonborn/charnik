<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Dice-tray button — icon options (batch 2)</title>
		<style>
			@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&display=swap');
			:root {
				--accent-deep: #b3243a;
				--bg: #0f1116;
				--text: #e6e8ec;
				--muted: #878f9d;
			}
			body {
				background: var(--bg);
				color: var(--text);
				font-family: 'Space Grotesk', sans-serif;
				margin: 0;
				padding: 32px;
			}
			h1 {
				font-size: 18px;
				font-weight: 700;
				margin: 0 0 4px;
			}
			p.sub {
				color: var(--muted);
				font-size: 13px;
				margin: 0 0 24px;
			}
			.grid {
				display: grid;
				grid-template-columns: repeat(2, 1fr);
				gap: 16px 40px;
				max-width: 760px;
			}
			.cell {
				display: flex;
				align-items: center;
				gap: 14px;
			}
			.num {
				font-family: monospace;
				font-size: 12px;
				color: var(--muted);
				width: 20px;
				text-align: right;
			}
			.dice {
				display: inline-flex;
				align-items: center;
				gap: 8px;
				font-family: 'Space Grotesk', sans-serif;
				font-weight: 600;
				font-size: 13px;
				padding: 7px 14px;
				border-radius: 999px;
				background: var(--accent-deep);
				border: 1px solid var(--accent-deep);
				color: #fff;
				cursor: pointer;
			}
			.name {
				font-size: 12px;
				color: var(--muted);
			}
			svg {
				flex: none;
			}
		</style>
	</head>
	<body>
		<h1>Dice-tray button — 10 more options (11–20)</h1>
		<p class="sub">Beyond d20/d6: other polyhedrals + dice-bag / reroll / motion. Pick a number.</p>
		<div class="grid">
			<!-- 11: d4 (tetrahedron) -->
			<div class="cell">
				<span class="num">11</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linejoin="round"
					>
						<path d="M12 2.5 L21 19.5 L3 19.5 Z" />
						<path d="M12 2.5 L12 13 M21 19.5 L12 13 M3 19.5 L12 13" />
					</svg>
					Dice tray
				</button>
				<span class="name">d4 tetrahedron</span>
			</div>

			<!-- 12: d8 (octahedron) -->
			<div class="cell">
				<span class="num">12</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linejoin="round"
					>
						<path d="M12 2.2 L20.5 12 L12 21.8 L3.5 12 Z" />
						<path d="M3.5 12 L20.5 12 M12 2.2 L7.5 12 L12 21.8 M12 2.2 L16.5 12 L12 21.8" />
					</svg>
					Dice tray
				</button>
				<span class="name">d8 octahedron</span>
			</div>

			<!-- 13: d10 -->
			<div class="cell">
				<span class="num">13</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linejoin="round"
					>
						<path d="M12 2.5 L20.5 10 L12 21.5 L3.5 10 Z" />
						<path
							d="M3.5 10 L12 13.5 L20.5 10 M12 2.5 L12 6 L3.5 10 M12 6 L20.5 10 M12 13.5 L12 21.5"
						/>
					</svg>
					Dice tray
				</button>
				<span class="name">d10</span>
			</div>

			<!-- 14: d12 (dodecahedron) -->
			<div class="cell">
				<span class="num">14</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linejoin="round"
					>
						<path d="M12 2.3 L20.8 8.7 L17.4 19.2 L6.6 19.2 L3.2 8.7 Z" />
						<path d="M12 6.6 L16.3 9.8 L14.7 14.9 L9.3 14.9 L7.7 9.8 Z" />
						<path
							d="M12 2.3 L12 6.6 M20.8 8.7 L16.3 9.8 M3.2 8.7 L7.7 9.8 M17.4 19.2 L14.7 14.9 M6.6 19.2 L9.3 14.9"
						/>
					</svg>
					Dice tray
				</button>
				<span class="name">d12 dodecahedron</span>
			</div>

			<!-- 15: d20 rolling + motion lines -->
			<div class="cell">
				<span class="num">15</span>
				<button class="dice">
					<svg
						width="16"
						height="15"
						viewBox="0 0 26 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linecap="round"
						stroke-linejoin="round"
					>
						<path d="M14 3 L22 7.5 L22 16.5 L14 21 L6 16.5 L6 7.5 Z" />
						<path d="M14 7.6 L18 15 L10 15 Z" />
						<path d="M1 8.5 L4.5 8.5 M0.5 12 L4 12 M1 15.5 L4.5 15.5" opacity="0.85" />
					</svg>
					Dice tray
				</button>
				<span class="name">d20 rolling (motion)</span>
			</div>

			<!-- 16: dice bag / pouch -->
			<div class="cell">
				<span class="num">16</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linecap="round"
						stroke-linejoin="round"
					>
						<path
							d="M7.5 8 Q6.5 7 7 6 L17 6 Q17.5 7 16.5 8 L18.5 17 Q19.2 21 12 21 Q4.8 21 5.5 17 Z"
						/>
						<path d="M9 6 Q9 3.5 12 3.5 Q15 3.5 15 6" />
						<circle cx="10.5" cy="14" r="0.9" fill="#fff" stroke="none" />
						<circle cx="14" cy="16" r="0.9" fill="#fff" stroke="none" />
					</svg>
					Dice tray
				</button>
				<span class="name">dice bag</span>
			</div>

			<!-- 17: mixed polyhedral set (d20 + d6) -->
			<div class="cell">
				<span class="num">17</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.4"
						stroke-linejoin="round"
					>
						<path d="M9 2.5 L15.5 6 L15.5 13 L9 16.5 L2.5 13 L2.5 6 Z" />
						<path d="M9 6 L12.2 11 L5.8 11 Z" />
						<rect x="13" y="12.5" width="8.5" height="8.5" rx="2" fill="#b3243a" />
						<circle cx="15.6" cy="15.1" r="0.9" fill="#fff" stroke="none" />
						<circle cx="17.2" cy="16.8" r="0.9" fill="#fff" stroke="none" />
						<circle cx="18.9" cy="18.5" r="0.9" fill="#fff" stroke="none" />
					</svg>
					Dice tray
				</button>
				<span class="name">polyhedral set</span>
			</div>

			<!-- 18: reroll (die + circular arrows) -->
			<div class="cell">
				<span class="num">18</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linecap="round"
						stroke-linejoin="round"
					>
						<rect x="8" y="8" width="8" height="8" rx="2" />
						<circle cx="12" cy="12" r="0.9" fill="#fff" stroke="none" />
						<path d="M19 8 A8 8 0 0 1 18.5 17" />
						<path d="M5 16 A8 8 0 0 1 5.5 7" />
						<path d="M19 8 L19.3 4.8 M19 8 L15.9 8.4" />
						<path d="M5 16 L4.7 19.2 M5 16 L8.1 15.6" />
					</svg>
					Dice tray
				</button>
				<span class="name">reroll die</span>
			</div>

			<!-- 19: d20 with big front number face (landed) -->
			<div class="cell">
				<span class="num">19</span>
				<button class="dice">
					<svg
						width="15"
						height="15"
						viewBox="0 0 24 24"
						fill="none"
						stroke="currentColor"
						stroke-width="1.5"
						stroke-linejoin="round"
					>
						<path d="M12 2.2 L20.5 7.1 L20.5 16.9 L12 21.8 L3.5 16.9 L3.5 7.1 Z" />
						<path d="M6.2 8.6 L17.8 8.6 L12 19 Z" />
						<text
							x="12"
							y="14.6"
							font-size="6"
							font-weight="700"
							text-anchor="middle"
							fill="#fff"
							stroke="none"
							font-family="sans-serif"
						>
							20
						</text>
					</svg>
					Dice tray
				</button>
				<span class="name">d20 face + 20</span>
			</div>

			<!-- 20: abstract three pips (minimal) -->
			<div class="cell">
				<span class="num">20</span>
				<button class="dice">
					<svg width="15" height="15" viewBox="0 0 24 24" fill="none">
						<circle cx="12" cy="6" r="2.4" fill="#fff" />
						<circle cx="6.5" cy="16.5" r="2.4" fill="#fff" />
						<circle cx="17.5" cy="16.5" r="2.4" fill="#fff" />
					</svg>
					Dice tray
				</button>
				<span class="name">three pips (minimal)</span>
			</div>
		</div>
	</body>
</html>
