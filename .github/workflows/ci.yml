name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Read-only: CI only checks/tests/builds — it never writes to the repo or creates releases.
permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v4 # version comes from packageManager in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # component tests run in headless Chromium (vitest browser mode)
      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Test
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Build (SPA)
        run: pnpm build
