name: Release desktop

# Manual only — daily pushes never trigger a release. Ship a real build like this:
#   1. Bump the version in BOTH package.json and src-tauri/tauri.conf.json.
#   2. Write the new section at the top of CHANGELOG.md (its top block becomes the release notes).
#   3. Actions tab → this workflow → "Run workflow".
# It builds + signs the installers (Windows NSIS + Linux AppImage/.deb/.rpm), emits latest.json (the
# updater manifest the app polls, with an entry per platform), and publishes a GitHub Release tagged
# from tauri.conf.json's version.
#
# One-time setup — the signing key is scoped to the `release` ENVIRONMENT, not repository secrets, so
# no other workflow (ci.yml, pages.yml, a PR) can read it (Settings → Environments → New environment
# → "release", then add these as environment secrets):
#   TAURI_SIGNING_PRIVATE_KEY           the minisign private key (contents of the generated .key file)
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  its password
# Recommended on that environment: a deployment branch rule limiting it to `main`/tags.
# The matching public key lives in src-tauri/tauri.conf.json (plugins.updater.pubkey). The one minisign
# key signs every platform's updater artifact, so Windows and Linux share these two secrets.

on:
  workflow_dispatch:

permissions:
  contents: write # create the release + upload assets

jobs:
  release:
    # `environment: release` is what grants this job (and only this job) the signing secrets.
    environment: release
    strategy:
      # Serial, NOT parallel: the two legs write the SAME release + latest.json. Running one at a time
      # lets the first create the release + manifest and the second MERGE its platform entry into the
      # existing latest.json (tauri-action reads-then-merges when the release already exists) — parallel
      # jobs would race on release creation and clobber each other's updater entry.
      max-parallel: 1
      fail-fast: false
      matrix:
        # Build the AppImage on the OLDEST supported Ubuntu: the glibc it links against sets the
        # minimum the AppImage will run on, so 22.04 gives the widest compatibility. Tauri auto-merges
        # src-tauri/tauri.linux.conf.json on the Linux leg (targets = appimage + deb; rpm is omitted
        # because rpmbuild isn't on the runners) and tauri.conf.json's defaults on Windows (NSIS).
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # Tauri v2 Linux build + AppImage bundling deps (webkit2gtk-4.1, appindicator, rsvg, patchelf).
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            libssl-dev \
            patchelf \
            build-essential \
            curl \
            wget \
            file

      - uses: pnpm/action-setup@v4 # version comes from packageManager in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
          # keep the two matrix legs' caches apart
          key: ${{ matrix.os }}

      - run: pnpm install --frozen-lockfile

      # Release notes = the top CHANGELOG.md section (its first "## …" header through the line before
      # the next "## "). Manual bump means CHANGELOG's top block already describes this version.
      - name: Extract release notes
        id: notes
        shell: bash
        run: |
          notes=$(awk '/^## /{c++} c==1' CHANGELOG.md)
          {
            echo 'body<<CHANGELOG_EOF'
            echo "$notes"
            echo CHANGELOG_EOF
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          # Signing is release-only: the base config keeps createUpdaterArtifacts OFF so anyone can
          # `pnpm tauri build` from source without the key; this overlay turns it back ON here, where
          # the signing secrets exist, so the release gets its .sig files + latest.json.
          args: --config src-tauri/tauri.release.conf.json
          # __VERSION__ is replaced by the version in src-tauri/tauri.conf.json.
          tagName: v__VERSION__
          releaseName: Charnik v__VERSION__
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          prerelease: false
